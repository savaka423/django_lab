{% load static %}

<!DOCTYPE html>

<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <title>Django Public Blog — регистрация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="page-signup">

<div class="content">
    <h1>Регистрация</h1>

    {#    <div class="registration-header" href="{% url 'archive' %}">#}
    {#        ← На главную#}
    {#    </div>#}


    <div class="registration-header">
        <a href="{% url 'archive' %}">
            ← На главную
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <label>
            <input type="text"
                   name="username"
                   placeholder="Имя пользователя"
                   value="{{ form.username }}">
        </label>

        <label>
            <input type="password"
                   name="password1"
                   placeholder="Пароль">
        </label>

        <label>
            <input type="password"
                   name="password2"
                   placeholder="Повторите пароль">
        </label>

        <input type="submit" value="Зарегистрироваться">
    </form>

    {% if form.errors %}
        <div class="form-errors">
            {{ form.errors }}
        </div>
    {% endif %}
</div>

</body>
</html>
